name: Build

on:
  workflow_call:
    inputs:
      upload-zips:
        description: Whether to extract per-target release zips
        type: string
        default: "false"

permissions:
  contents: read

jobs:
  build:
    name: Build wheel (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            manylinux: auto
            zip: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            manylinux: auto
            zip: false
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            manylinux: musllinux_1_2
            zip: true
            suffix: x86_64-unknown-linux-musl
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
            manylinux: musllinux_1_2
            zip: true
            suffix: aarch64-unknown-linux-musl
          - target: x86_64-apple-darwin
            os: macos-latest
            zip: true
            suffix: x86_64-apple-darwin
          - target: aarch64-apple-darwin
            os: macos-latest
            zip: true
            suffix: aarch64-apple-darwin
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: ${{ matrix.manylinux }}
          working-directory: pkg/pypi
          # libgit2 is vendored, so the Linux build containers need a C
          # toolchain. libgit2-sys 0.18 uses the `cc` crate (no cmake).
          before-script-linux: |
            if command -v apk > /dev/null; then
              apk add --no-cache build-base
            elif command -v yum > /dev/null; then
              yum install -y gcc gcc-c++ make
            fi

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.target }}
          path: pkg/pypi/dist/*.whl

      - name: Extract release zip
        if: inputs.upload-zips == 'true' && matrix.zip
        run: pkg/pypi/extract_binary.sh pkg/pypi/dist/*.whl "pls-${{ matrix.suffix }}.zip"

      - name: Upload release zip artifact
        if: inputs.upload-zips == 'true' && matrix.zip
        uses: actions/upload-artifact@v7
        with:
          name: asset-${{ matrix.suffix }}
          path: pls-${{ matrix.suffix }}.zip

  docs:
    name: Build docs
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup env
        uses: ./.github/actions/setup-env
        with:
          setup_rust: "false"
          setup_node: "true"

      - name: Download wheel
        uses: actions/download-artifact@v8
        with:
          name: wheels-x86_64-unknown-linux-gnu
          path: /tmp/wheel

      - name: Extract `pls` binary from the wheel
        run: |
          mkdir -p /tmp/pls
          # The wheel is a zip; the binary lives at `*.data/scripts/pls`.
          unzip -j /tmp/wheel/*.whl "*.data/scripts/pls" -d /tmp/pls
          chmod +x /tmp/pls/pls
          echo "/tmp/pls" >> "$GITHUB_PATH"

      - name: Ensure binary is accessible
        run: pls --version

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          working-directory: examples
          cache-dependency-glob: uv.lock

      - name: Generate examples
        working-directory: examples/
        run: |
          just install
          just all

      - name: Build docs
        working-directory: docs/
        run: pnpm build

      - name: Upload docs site
        uses: actions/upload-artifact@v7
        with:
          name: docs-site
          path: docs/dist
          # `.nojekyll` is a hidden file, excluded by default, but it is
          # required to stop GitHub Pages from hiding the `_astro/` directory.
          include-hidden-files: true
