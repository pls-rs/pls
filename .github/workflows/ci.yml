name: CI + CD

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

# Make sure CI fails on all warnings, including Clippy lints
env:
  RUSTFLAGS: "-Dwarnings"

permissions:
  contents: read

# Cancel superseded runs on the same ref (PRs only; never cancel `main`
# pushes, which we keep as build-validation history).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint: # Also checks formatting.
    name: Run lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup env
        uses: ./.github/actions/setup-env
        with:
          rust_components: clippy, rustfmt
          # Oxfmt, Oxlint, ESLint and Prettier are all Node.js packages.
          setup_node: "true"

      - name: Run lint
        run: just lint

  unit:
    name: Run unit test (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
          - name: macOS
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup env
        uses: ./.github/actions/setup-env

      - name: Run unit test
        run: just test

  build:
    name: Build targets and docs
    needs:
      - lint
      - unit
    uses: ./.github/workflows/build.yml
