name: CI + CD

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  # Make sure CI fails on all warnings, including Clippy lints
  RUSTFLAGS: "-Dwarnings"
  # Authenticate `cargo-binstall`'s GitHub API calls to prevent throttling.
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

permissions:
  contents: read

# Cancel superseded runs on the same ref (PRs only; never cancel `main`
# pushes, which we keep as build-validation history).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint: # Also checks formatting.
    name: Run lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup env
        uses: ./.github/actions/setup-env
        with:
          rust_components: clippy, rustfmt
          # Oxfmt, Oxlint, ESLint and Prettier are all Node.js packages.
          setup_node: "true"

      - name: Run lint
        run: just lint

  unit:
    name: Run unit test (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
          - name: macOS
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup env
        uses: ./.github/actions/setup-env

      - name: Run unit test
        run: just test

  build:
    name: Build targets and docs
    needs:
      - lint
      - unit
    uses: ./.github/workflows/build.yml

  publish-docs:
    name: Publish docs
    needs: build
    # Publish per-commit on `main` (and manual runs); never on PRs.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Download docs site
        uses: actions/download-artifact@v8
        with:
          name: docs-site
          path: dist

      - name: Configure git
        working-directory: dist
        run: |
          git init --initial-branch=gh-pages
          git config user.name "Dhruv Bhanushali"
          git config user.email "hi@dhruvkb.dev"

      - name: Publish to GitHub Pages
        working-directory: dist
        run: |
          git add .
          git commit --message "Build documentation"
          git remote add origin https://x-access-token:${{ secrets.ACCESS_TOKEN }}@github.com/pls-rs/pls-rs.github.io.git
          git push --force origin gh-pages
