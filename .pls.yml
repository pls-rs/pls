icons:
  editorconfig: "ŅÖÆ" # nf-seti-editorconfig
  egg: "¾░¬»" # nf-md-egg
  rocket: "’É¦" # nf-oct-rocket
specs:
  - pattern: ^docs$
    icons:
      - book
  - pattern: ^examples$
    icons:
      - egg
  - pattern: ^.idea$
    importance: -2
  - pattern: ^src$
    style: bold
    importance: 1
  - pattern: ^target$
    icons:
      - rocket
  - pattern: ^(justfile|README.md)$
    style: green bold
    importance: 2
  - pattern: ^\.editorconfig$
    icons:
      - editorconfig
  - pattern: ^(pre-commit\.pyz|\.pre-commit-config\.yaml)$
    icons:
      - broom
  - pattern: ^(.prettierignore|prettier.config.mjs)$
    icons:
      - broom
entry_const:
  typ:
    dir:
      style: cyan
