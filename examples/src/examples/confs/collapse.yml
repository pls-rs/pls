# .pls.yml
app_const:
  tree:
    pipe_space: "<magenta>|</>   "
    space_space: "    " # should be as wide as the other entries for alignment
    tee_dash: "<green>+--</> "
    bend_dash: "<blue>+--</> "
specs:
  - pattern: (?<base>.+)\.min\.js$
    collapse:
      sub: $base.ts
  - pattern: \.css$
    collapse:
      ext: scss
  - pattern: uv.lock
    collapse:
      name: pyproject.toml
